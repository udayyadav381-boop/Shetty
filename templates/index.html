<!DOCTYPE html>
<html>
<head>
<title>Vijay Viju</title>

<style>
body {
    background: #000;
    color: white;
    text-align: center;
    font-family: Arial;
    margin: 0;
}

/* Header */
h1 {
    margin-top: 30px;
    font-size: 42px;
}

p {
    color: #ccc;
}

/* Portfolio Grid */
.portfolio {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 30px;
    max-width: 1100px;
    margin: auto;
}

/* Images */
.portfolio img {
    width: 100%;
    border-radius: 15px;
    transition: 0.3s;
}

/* Hover Effect */
.portfolio img:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<h1>Vijay Viju</h1>
<p>Actor | Theatre Artist</p>

<h2>Portfolio</h2>

<div class="portfolio">
{% for item in profile.portfolio %}
    <img src="{{ url_for('static', filename=item.src) }}" alt="{{ item.alt }}">
{% endfor %}
</div>

</body>
</html>
